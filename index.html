<!DOCTYPE html>
<html>
<head>
  <title>Meal Attendance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }
    

    .card {
      background: white;
      padding: 20px;
      margin: 40px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
  <style>
#reader {
  display: none;
}
</style>
</head>

<body>

<div class="card" id="login" style="position:relative; z-index:10;">
  <h2>Meal Attendance</h2>
  <input type="text" id="userId" placeholder="Masukkan ID">
 <button onclick="login()">Login</button>
</button>
</div>


<div id="reader" style="display:none;"></div>

<div class="card" id="menu" style="display:none;">
  <h3 id="welcome"></h3>
  <button onclick="scan()">Scan QR</button>
</div>


<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxyrVd_3xdjboSYKiHTq8mxt58Jq7DKzeV5JfaiKb2XV2hYMIL3oPZN5Xzz49uXseWMkQ/exec";

let userId = "";
let nama = "";

function login() {
  alert("klik terdeteksi");

  const input = document.getElementById("userId");
  userId = input.value.trim();

  if (!userId) {
    alert("Masukkan ID dulu");
    return;
  }

  const url = API_URL + "?action=login&userId=" + userId;
  console.log("URL:", url);

  fetch(url)
    .then(res => {
      console.log("Response raw:", res);
      return res.text(); // 🔥 ubah dulu ke text
    })
    .then(text => {
      console.log("TEXT:", text);

      try {
        const data = JSON.parse(text);
        console.log("JSON:", data);

        if (data.status === "ok") {
          nama = data.nama;

          document.getElementById("login").style.display = "none";
          document.getElementById("menu").style.display = "block";
          document.getElementById("welcome").innerText = "Welcome " + nama;
        } else {
          alert("User tidak ditemukan");
        }
      } catch (e) {
        alert("Response bukan JSON:\n" + text);
      }
    })
    .catch(err => {
      console.error("FETCH ERROR:", err);
      alert("Gagal konek ke API");
    });
}
function scan() {
  const scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    const cam = devices[0].id;

    scanner.start(cam, {fps:10, qrbox:250}, (text) => {
      scanner.stop();

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          userId: userId,
          qrData: text
        })
      })
      .then(res => res.json())
      .then(res => alert(res.message));
    });
  });
}
</script>

</body>
</html>
