<!DOCTYPE html>
<html>
<head>
  <title>Meal Attendance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }
    

    .card {
      background: white;
      padding: 20px;
      margin: 40px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
  <style>
#reader {
  display: none;
}
</style>
</head>

<body>

<div class="card" id="login" style="position:relative; z-index:10;">
  <h2>Meal Attendance</h2>
  <input type="text" id="userId" placeholder="Masukkan ID">
 <button onclick="login()">Login</button>
</button>
</div>


<div id="reader" style="display:none;"></div>

<div class="card" id="menu" style="display:none;">
  <h3 id="welcome"></h3>
  <p id="userinfo" style="margin:8px 0; font-size:14px; color:#555;"></p>

  <button onclick="scan()">Scan QR</button>
  <button onclick="logout()" style="margin-top:10px; background:#dc3545;">
    Logout
  </button>
</div>


<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzC2xiFoApcTLmAUCm5z59K9ltZeNhGTS7fEE__0wC1Scw8xdDkH35Oeb1fq0AwALf0/exec";

let currentUser = null;

// ========= LOGIN =========
function login() {
  const input = document.getElementById("userId");
  const userId = input.value.trim();

  if (!userId) {
    alert("Masukkan ID dulu");
    return;
  }

  fetch(`${API_URL}?action=login&userId=${encodeURIComponent(userId)}`)
    .then(res => res.json())
    .then(data => {
      if (data.status === "ok") {
        currentUser = data.user;

        // simpan session
        localStorage.setItem("mealUser", JSON.stringify(currentUser));

        showMenu();
      } else {
        alert("User tidak ditemukan");
      }
    })
    .catch(() => alert("Gagal konek ke API"));
}

// ========= TAMPILKAN MENU =========
function showMenu() {
  document.getElementById("login").style.display = "none";
  document.getElementById("menu").style.display = "block";

  document.getElementById("welcome").innerText =
    `Welcome ${currentUser.nama}`;

  document.getElementById("userinfo").innerText =
    `Dept: ${currentUser.dept} | Role: ${currentUser.role}`;
}

// ========= LOGOUT =========
function logout() {
  localStorage.removeItem("mealUser");
  currentUser = null;
  location.reload();
}

// ========= AUTO LOGIN =========
window.onload = () => {
  const saved = localStorage.getItem("mealUser");
  if (saved) {
    currentUser = JSON.parse(saved);
    showMenu();
  }
};

// ========= SCAN QR =========
function scan() {
  const reader = document.getElementById("reader");
  reader.style.display = "block";

  const scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    const cam = devices[0].id;

    scanner.start(cam, { fps: 10, qrbox: 250 }, text => {
      scanner.stop();
      reader.style.display = "none";

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          userId: currentUser.userId,
          qrData: text
        })
      })
      .then(res => res.json())
      .then(res => alert(res.message));
    });
  });
}
</script>

</body>
</html>
