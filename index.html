<!DOCTYPE html>
<html>
<head>
  <title>Meal Attendance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 40px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card" id="login">
  <h2>Meal Attendance</h2>
  <input type="text" id="userId" placeholder="Masukkan ID">
  <button onclick="alert('klik jalan')">Login</button>
</div>

<div class="card" id="menu" style="display:none;">
  <h3 id="welcome"></h3>
  <button onclick="scan()">Scan QR</button>
</div>

<div id="reader" style="width:300px;margin:auto;"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxyrVd_3xdjboSYKiHTq8mxt58Jq7DKzeV5JfaiKb2XV2hYMIL3oPZN5Xzz49uXseWMkQ/exec";

let userId = "";
let nama = "";

function login() {
  userId = document.getElementById("userId").value;

  fetch(API_URL + "?action=login&userId=" + userId)
    .then(res => res.json())
    .then(res => {
      if (res.status === "ok") {
        nama = res.nama;

        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
        document.getElementById("welcome").innerText = "Welcome " + nama;
      } else {
        alert("User tidak ditemukan");
      }
    });
}

function scan() {
  const scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    const cam = devices[0].id;

    scanner.start(cam, {fps:10, qrbox:250}, (text) => {
      scanner.stop();

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          userId: userId,
          qrData: text
        })
      })
      .then(res => res.json())
      .then(res => alert(res.message));
    });
  });
}
</script>

</body>
</html>
